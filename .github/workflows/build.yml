name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build x64 and arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx tsc --noEmit
          npx vite build
          npx electron-builder --win --x64 --arm64 --config electron-builder.json5
        shell: bash

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: release/*/Singularity-Windows-*-Setup.exe

  build-linux:
    strategy:
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx tsc --noEmit
          npx vite build
          npx electron-builder --linux deb --${{ matrix.arch }} --config electron-builder.json5

      - name: Upload Linux .deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb-${{ matrix.arch }}
          path: release/*/Singularity-Linux-*.deb

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build x64 and arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max_old_space_size=4096'
        run: |
          npx tsc --noEmit
          npx vite build
          npx electron-builder --mac --x64 --arm64 --config electron-builder.json5

      - name: Upload Mac DMGs
        uses: actions/upload-artifact@v4
        with:
          name: mac-installers
          path: release/*/Singularity-Mac-*-Installer.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Flatten artifacts
        run: |
          mkdir -p installers
          find . -type f -name '*.exe' -exec cp {} installers/ \;
          find . -type f -name '*.deb' -exec cp {} installers/ \;
          find . -type f -name '*.dmg' -exec cp {} installers/ \;
          ls -la installers/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installers/*
          generate_release_notes: true
